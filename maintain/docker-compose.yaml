services:
  rstm:
    container_name: rstm
    restart: unless-stopped
    image: ghcr.io/rustamyusupov/rstm.me:master
    networks:
      - traefik_rstm
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.rstm.entrypoints=web,websecure"
      - "traefik.http.routers.rstm.rule=Host(`rstm.me`)"
      - "traefik.http.routers.rstm.tls=true"
      - "traefik.http.services.rstm.loadbalancer.server.port=8080"
      - "traefik.http.routers.rstm.tls.certresolver=letsEncrypt"
  life:
    container_name: life
    restart: unless-stopped
    image: ghcr.io/rustamyusupov/life:master
    networks:
      - traefik_rstm
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.life.entrypoints=web,websecure"
      - "traefik.http.routers.life.rule=Host(`life.rstm.me`)"
      - "traefik.http.routers.life.tls=true"
      - "traefik.http.services.life.loadbalancer.server.port=8080"
      - "traefik.http.routers.life.tls.certresolver=letsEncrypt"
  timer:
    container_name: timer
    restart: unless-stopped
    image: ghcr.io/rustamyusupov/timer:main
    networks:
      - traefik_rstm
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.timer.entrypoints=web,websecure"
      - "traefik.http.routers.timer.rule=Host(`timer.rstm.me`)"
      - "traefik.http.routers.timer.tls=true"
      - "traefik.http.services.timer.loadbalancer.server.port=8080"
      - "traefik.http.routers.timer.tls.certresolver=letsEncrypt"
  wishlist:
    container_name: wishlist
    restart: unless-stopped
    image: ghcr.io/rustamyusupov/wishlist:main
    volumes:
      - ~/:/app/data
    networks:
      - traefik_rstm
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.wishlist.entrypoints=web,websecure"
      - "traefik.http.routers.wishlist.rule=Host(`wishlist.rstm.me`)"
      - "traefik.http.routers.wishlist.tls=true"
      - "traefik.http.services.wishlist.loadbalancer.server.port=8080"
      - "traefik.http.routers.wishlist.tls.certresolver=letsEncrypt"
  intervals-bridge:
    container_name: intervals-bridge
    restart: unless-stopped
    image: ghcr.io/rustamyusupov/intervals-bridge:master
    env_file:
      - /opt/intervals-bridge/.env
    volumes:
      - /opt/intervals-bridge/allowed-athlete-ids.txt:/app/config/allowed-athlete-ids.txt:ro
      - /opt/intervals-bridge/data:/app/data
    networks:
      - traefik_rstm
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.intervals-bridge.entrypoints=web,websecure"
      - "traefik.http.routers.intervals-bridge.rule=Host(`intervals.rstm.me`)"
      - "traefik.http.routers.intervals-bridge.tls=true"
      - "traefik.http.services.intervals-bridge.loadbalancer.server.port=8080"
      - "traefik.http.routers.intervals-bridge.tls.certresolver=letsEncrypt"
  traefik:
    container_name: "traefik"
    restart: unless-stopped
    image: "traefik:v3"
    networks:
      - traefik_rstm
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsEncrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsEncrypt.acme.email=i@rstm.me"
      - "--certificatesresolvers.letsEncrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
  watchtower:
    container_name: watchtower
    restart: always
    image: containrrr/watchtower
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command: --debug true --cleanup true --interval 30 rstm life timer wishlist intervals-bridge

networks:
  traefik_rstm:
